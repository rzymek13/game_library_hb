trigger:
  - master # Przywrócono gałąź master

pool:
  name: 'Default'

steps:
  - task: JavaToolInstaller@0
    displayName: 'Install Java 21'
    inputs:
      versionSpec: '21'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'FromURL'
      jdkURL: 'https://download.oracle.com/java/21/latest/jdk-21_windows-x64_bin.zip'
    condition: succeededOrFailed()

  - task: Maven@4
    displayName: 'Build and Run Cucumber Tests'
    inputs:
      mavenPomFile: 'pom.xml'
      goals: 'clean verify -Dtest=CucumberTestRunner'
      options: '-Dmaven.test.failure.ignore=true'
    condition: succeededOrFailed()

  - task: PublishTestResults@2
    displayName: 'Publish JUnit Test Results'
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/surefire-reports/TEST-*.xml'
      mergeTestResults: true
      failTaskOnFailedTests: false
    condition: succeededOrFailed()

  - task: PublishAllureReport@2 # Używam PublishAllureReport@2
    displayName: 'Publish Allure Report'
    inputs:
      allureResults: '$(System.DefaultWorkingDirectory)/target/allure-results'
      targetDir: '$(Build.ArtifactStagingDirectory)/allure-report'
      cleanTargetDir: true
    condition: succeededOrFailed()

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Allure Report Artifact'
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)/allure-report'
      artifactName: 'AllureReport'
      publishLocation: 'Container'
    condition: succeededOrFailed() # Dodano warunek, aby zawsze publikować, nawet jeśli testy zawiodą
