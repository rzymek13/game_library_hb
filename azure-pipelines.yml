  #   condition: succeededOrFailed()
  #   inputs:
  #     pathToPublish: '$(Build.ArtifactStagingDirectory)/allure-report' # Ścieżka może wymagać dostosowania
  #     artifactName: 'AllureReport'
  #     publishLocation: 'Container'
