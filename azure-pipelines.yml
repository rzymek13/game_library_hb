trigger:
  - master 

pool:
  vmImage: 'ubuntu-latest'

steps:
  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '21'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  - task: Maven@4
    displayName: 'Build and Run Cucumber Tests'
    inputs:
      mavenPomFile: 'pom.xml'
      goals: 'clean verify -Dtest=CucumberTestRunner'
      options: '-Dmaven.test.failure.ignore=true'
    # To zadanie uruchomi testy i wygeneruje surowe wyniki Allure w `target/allure-results`

  - task: PublishTestResults@2
    displayName: 'Publish JUnit Test Results'
    condition: succeededOrFailed() # Uruchom nawet jeśli poprzednie zadanie zawiedzie
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/surefire-reports/TEST-*.xml'
      mergeTestResults: true
      failTaskOnFailedTests: false

  # --- Weryfikacja zadania Allure ---
  # Błąd "task not found" mimo zainstalowanego rozszerzenia często oznacza,
  # że zainstalowano inne rozszerzenie Allure, które używa innej nazwy zadania.
  # Najczęstszą alternatywą dla 'AllureReport@1' jest 'AllureGenerate@1'.
  # Spróbuj użyć poniższego zadania. Jeśli to również zawiedzie,
  # sprawdź nazwę zadania w ustawieniach organizacji Azure DevOps -> Extensions -> [Twoje rozszerzenie Allure].
  - task: PublishAllureReport@2
    displayName: 'Generate Allure Report'
    condition: succeededOrFailed() # Uruchom to zadanie, aby zawsze generować raport
    inputs:
      resultsDir: '$(System.DefaultWorkingDirectory)/target/allure-results'
      reportDir: '$(Build.ArtifactStagingDirectory)/allure-report'
      cleanReportDir: true

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Allure Report Artifact'
    condition: succeededOrFailed()
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)/allure-report'
      artifactName: 'AllureReport'
      publishLocation: 'Container'
