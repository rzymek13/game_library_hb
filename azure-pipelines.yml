trigger:
  - master

pool:
  name: 'Default' # Zmieniono na 'Default' dla self-hosted agenta.
  # Jeśli otrzymasz grant od Microsoftu, przywróć:
  # vmImage: 'ubuntu-latest'

steps:
  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '21'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  - task: Maven@4
    displayName: 'Build and Run Cucumber Tests'
    inputs:
      mavenPomFile: 'pom.xml'
      goals: 'clean verify -Dtest=CucumberTestRunner'
      options: '-Dmaven.test.failure.ignore=true'

  - task: PublishTestResults@2
    displayName: 'Publish JUnit Test Results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/surefire-reports/TEST-*.xml'
      mergeTestResults: true
      failTaskOnFailedTests: false

  # --- Generowanie Raportu Allure ---
  # Upewnij się, że masz zainstalowane rozszerzenie Allure Report w Azure DevOps.
  # Jeśli nadal występuje błąd "Task not found", sprawdź dokładną nazwę zadania w Marketplace.
  # Często używane nazwy to: 'AllureGenerate@1', 'AllureReport@1'.
  - task: AllureGenerate@1
    displayName: 'Generate Allure Report'
    condition: succeededOrFailed()
    inputs:
      resultsDir: '$(System.DefaultWorkingDirectory)/target/allure-results'
      targetDir: '$(Build.ArtifactStagingDirectory)/allure-report' # Poprawiono 'reportDir' na 'targetDir' (typowe dla AllureGenerate)
      cleanTargetDir: true # Poprawiono 'cleanReportDir' na 'cleanTargetDir'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Allure Report Artifact'
    condition: succeededOrFailed()
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)/allure-report'
      artifactName: 'AllureReport'
      publishLocation: 'Container'
