trigger:
  - master

pool:
  name: 'Default'

steps:
  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '21'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'FromURL' # Zmieniono na FromURL, aby pobrać Javę 21
      # Możesz dodać również:
      # jdkUrl: 'https://download.oracle.com/java/21/latest/jdk-21_windows-x64_bin.zip' # Przykładowy URL dla Windows, dostosuj do OS agenta
      # destinationDirectory: '$(Agent.ToolsDirectory)/jdk21' # Opcjonalnie: gdzie zainstalować
    displayName: 'Install Java 21'

  - task: Maven@4
    displayName: 'Build and Run Cucumber Tests'
    inputs:
      mavenPomFile: 'pom.xml'
      goals: 'clean verify -Dtest=CucumberTestRunner'
      options: '-Dmaven.test.failure.ignore=true'

  - task: PublishTestResults@2
    displayName: 'Publish JUnit Test Results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '**/surefire-reports/TEST-*.xml'
      mergeTestResults: true
      failTaskOnFailedTests: false

  - task: PublishAllureReport@2
    displayName: 'Generate Allure Report'
    condition: succeededOrFailed()
    inputs:
      resultsDir: '$(System.DefaultWorkingDirectory)/target/allure-results'
      targetDir: '$(Build.ArtifactStagingDirectory)/allure-report'
      cleanTargetDir: true

  - task: PublishBuildArtifacts@1
    displayName: 'Publish Allure Report Artifact'
    condition: succeededOrFailed()
    inputs:
      pathToPublish: '$(Build.ArtifactStagingDirectory)/allure-report'
      artifactName: 'AllureReport'
      publishLocation: 'Container'
